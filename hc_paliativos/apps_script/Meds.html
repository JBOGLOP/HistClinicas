     irruptivo:"Formulación de liberación prolongada no es adecuada para rescate. Para dolor irruptivo en pacientes con tapentadol basal, usar opioides de liberación inmediata.",
     total:"Tapentadol como opción farmacológica en dolor total severo crónico. Mejor tolerabilidad gastrointestinal (menor náusea, estreñimiento) mejora calidad de vida."
   },precauciones:"No triturar tab. lib. prolongada. Evitar con IMAO. Menor interacción con CYP450 que tramadol. Riesgo de síndrome serotoninérgico si se asocia a serotoninérgicos. Precaución en insuficiencia hepática severa."},

  // ============ COADYUVANTES — DOLOR NEUROPÁTICO ============
  {id:"gabapentina",name:"Gabapentina",cat:"Coadyuvante anticonvulsivante",grupo:"Dolor neuropático - 1ª línea",
   atc:"N03AX12",invima:"Múltiples registros INVIMA vigentes.",
   presentaciones:"Cápsulas 300/400mg. Tabletas 600/800mg.",
   indicacion_invima:"Dolor neuropático periférico. Epilepsia.",
   dosis_usual:"Inicio: 300mg/noche. Titular: 300mg c/3 días. Dosis terapéutica: 900-3600mg/día en 3 tomas.",
   justificacion_tipos:{
     nociceptivo_somatico:"No es primera línea para dolor nociceptivo somático puro. Puede contribuir como coadyuvante si existe componente de sensibilización central.",
     neuropatico:"Gabapentina es PRIMERA LÍNEA para dolor neuropático en cuidados paliativos. Bloquea subunidad α2δ de canales de calcio voltaje-dependientes, reduciendo la liberación de neurotransmisores excitatorios. Registro INVIMA para dolor neuropático periférico. Evidencia sólida en neuralgia postherpética, neuropatía diabética y dolor neuropático oncológico. Titular gradualmente desde 300mg/noche.",
     mixto:"Coadyuvante esencial en dolor mixto para abordar el componente neuropático. Asociar a opioide del escalón correspondiente. Titular gradualmente para minimizar somnolencia.",
     total:"Componente coadyuvante del manejo multimodal del dolor total con componente neuropático."
   },precauciones:"Titular lentamente (reduce somnolencia/mareo). Ajustar en insuficiencia renal. No suspender abruptamente. Somnolencia puede ser ventajosa si insomnio asociado."},

  {id:"pregabalina",name:"Pregabalina",cat:"Coadyuvante anticonvulsivante",grupo:"Dolor neuropático - 1ª línea",
   atc:"N03AX16",invima:"Registros INVIMA vigentes.",
   presentaciones:"Cápsulas 25/50/75/150/300mg.",
   indicacion_invima:"Dolor neuropático periférico y central. Trastorno de ansiedad generalizada. Epilepsia.",
   dosis_usual:"Inicio: 25-75mg/noche. Titular a 150-600mg/día en 2 tomas.",
   justificacion_tipos:{
     nociceptivo_somatico:"No primera línea para dolor nociceptivo somático. Puede coadyuvar en dolor con componente de sensibilización.",
     neuropatico:"Pregabalina es PRIMERA LÍNEA para dolor neuropático con registro INVIMA específico. Más potente y predecible que gabapentina. Farmacocinética lineal (absorción más predecible). Beneficio adicional ansiolítico relevante en pacientes paliativos con ansiedad comórbida. Inicio más rápido que gabapentina.",
     mixto:"Coadyuvante de primera línea en dolor mixto para el componente neuropático. Ventaja sobre gabapentina: farmacocinética lineal, menor número de tomas (BID vs TID), efecto ansiolítico adicional.",
     total:"En dolor total con componente neuropático y ansiedad, pregabalina ofrece doble beneficio: analgesia neuropática + efecto ansiolítico."
   },precauciones:"Titular gradualmente. Ajustar en insuficiencia renal. Somnolencia, edema periférico, aumento de peso. No suspender abruptamente. Menor titulación requerida que gabapentina."},

  {id:"amitriptilina",name:"Amitriptilina",cat:"Coadyuvante antidepresivo tricíclico",grupo:"Dolor neuropático - 1ª línea",
   atc:"N06AA09",invima:"Registros INVIMA vigentes.",
   presentaciones:"Tabletas 25mg.",
   indicacion_invima:"Depresión. Dolor neuropático. Profilaxis de migraña.",
   dosis_usual:"Inicio: 10-25mg/noche. Titular cada semana. Dosis analgésica: 25-75mg/noche.",
   justificacion_tipos:{
     nociceptivo_somatico:"Evidencia en dolor somático crónico por modulación descendente. Útil como coadyuvante en dolor musculoesquelético crónico.",
     neuropatico:"Amitriptilina es PRIMERA LÍNEA para dolor neuropático (NNT 3.6). Mecanismo: inhibición dual de recaptación de serotonina y noradrenalina + bloqueo canales de sodio. Registro INVIMA para dolor neuropático. Beneficio adicional en insomnio y depresión comórbidos. Dosis analgésica menor que antidepresiva.",
     mixto:"Coadyuvante valioso en dolor mixto con componente neuropático, especialmente si coexiste insomnio y/o depresión. Administrar en dosis nocturna única.",
     total:"Amitriptilina aborda múltiples dimensiones del dolor total: analgesia neuropática, mejora del sueño, efecto antidepresivo. Especialmente valiosa en cuidados paliativos por su perfil multidimensional."
   },precauciones:"Efectos anticolinérgicos (boca seca, estreñimiento, retención urinaria). Contraindicada en glaucoma de ángulo estrecho, retención urinaria, cardiopatía (prolonga QTc). Precaución en ancianos. Somnolencia: administrar en la noche."},

  {id:"duloxetina",name:"Duloxetina",cat:"Coadyuvante IRSN",grupo:"Dolor neuropático - 1ª línea",
   atc:"N06AX21",invima:"Registros INVIMA vigentes.",
   presentaciones:"Cápsulas 30/60mg.",
   indicacion_invima:"Depresión mayor. Dolor neuropático diabético periférico. Trastorno de ansiedad generalizada.",
   dosis_usual:"Inicio: 30mg/día. Aumentar a 60mg/día después de 1-2 semanas.",
   justificacion_tipos:{
     nociceptivo_somatico:"Duloxetina tiene evidencia en dolor musculoesquelético crónico (osteoartrosis, lumbalgia crónica) por modulación de vía inhibitoria descendente.",
     neuropatico:"Duloxetina con registro INVIMA para dolor neuropático diabético periférico. IRSN con evidencia sólida en dolor neuropático (NNT 6.4). Alternativa a amitriptilina con mejor perfil de efectos adversos en ancianos. Menos efectos anticolinérgicos.",
     mixto:"Útil en dolor mixto con componente neuropático, especialmente en pacientes donde amitriptilina está contraindicada (ancianos, cardiopatía, retención urinaria).",

   },precauciones:"Náusea inicial frecuente (titular gradualmente). No suspender abruptamente. Precaución en hepatopatía. Interacción con CYP1A2 y CYP2D6. No combinar con IMAO."},

  // ============ COADYUVANTES — OTROS ============
  {id:"dexametasona",name:"Dexametasona",cat:"Corticoesteroide",grupo:"Coadyuvante antiinflamatorio",
   atc:"H02AB02",invima:"Múltiples registros INVIMA vigentes.",

   indicacion_invima:"Procesos inflamatorios. Edema cerebral. Antiemético.",

   justificacion_tipos:{
     nociceptivo_somatico:"Dexametasona indicada como coadyuvante en dolor óseo metastásico (reduce edema peritumoral e inflamación). Dosis: 4-8mg/día. También útil en compresión medular (dosis altas: 16mg/día). Registro INVIMA para procesos inflamatorios.",
     nociceptivo_visceral:"Indicada en dolor visceral por distensión capsular hepática (hepatomegalia tumoral), obstrucción intestinal maligna (reduce edema de pared), y compresión tumoral visceral. Dosis según severidad.",
     neuropatico:"Coadyuvante en dolor neuropático por compresión nerviosa tumoral (reduce edema perineural). Especialmente indicada en compresión medular y plexopatías tumorales. Acción rápida mientras se titulan otros coadyuvantes.",
     mixto:"Dexametasona como coadyuvante en dolor mixto oncológico: reduce componente inflamatorio y edema perineural/peritumoral. Beneficios adicionales: mejora apetito, reduce náusea, efecto euforizante leve.",
     irruptivo:"Puede reducir frecuencia de dolor irruptivo al disminuir edema tumoral y componente inflamatorio.",
     total:"Dexametasona como coadyuvante multidimensional en cuidados paliativos: analgesia, antiemético, orexígeno, mejora estado general, reduce edema cerebral. Impacto positivo en múltiples dimensiones del dolor total."
   },precauciones:"Hiperglicemia, inmunosupresión, osteoporosis, miopatía proximal, insomnio (administrar en la mañana), psicosis. Reducir dosis gradualmente si uso >7 días. Protección gástrica si asocia AINE."},

  {id:"haloperidol",name:"Haloperidol",cat:"Antipsicótico",grupo:"Antiemético / Antidelirium",
   atc:"N05AD01",invima:"Registros INVIMA vigentes.",
   presentaciones:"Gotas 2mg/mL. Tabletas 5mg. Ampolla 5mg/mL.",

     nociceptivo_somatico:"No es analgésico directo. Indicado como antiemético si náusea por opioides (antagonismo D2 en zona quimiorreceptora del gatillo). Indicado en delirium que puede coexistir con dolor no controlado.",

     total:"Haloperidol en dolor total: manejo del delirium (frecuente en enfermedad avanzada), antiemético opioide de primera línea, y agitación terminal. Registro INVIMA para náuseas/vómitos y psicosis."

  {id:"midazolam",name:"Midazolam",cat:"Benzodiazepina",grupo:"Sedación paliativa / Anticonvulsivante",
   atc:"N05CD08",invima:"Registros INVIMA vigentes. Control especial.",

     nociceptivo_somatico:"No es analgésico. Indicado para sedación paliativa cuando el dolor es refractario a todas las intervenciones analgésicas disponibles (sedación paliativa proporcional según Ley 1733/2014).",

     total:"Midazolam en cuidados paliativos: sedación paliativa como recurso terapéutico final ante sufrimiento refractario (dolor, disnea, agitación, angustia existencial). Marco legal: Ley 1733/2014, Resolución 2665/2018. También: crisis convulsivas, mioclonías por opioides, ansiedad severa. Vía SC permite manejo domiciliario. Documentar indicación, proporcionalidad y consentimiento."
   },precauciones:"Sedación paliativa requiere: documentación de refractariedad, consentimiento informado, indicación por equipo paliativo, proporcionalidad. Depresión respiratoria: tener flumazenilo disponible. Paradoja: puede causar agitación paradójica (especialmente ancianos)."},

  {id:"hioscina",name:"Butilbromuro de Hioscina",cat:"Anticolinérgico",grupo:"Antiespasmódico / Estertores",

     total:"En cuidados paliativos: manejo de estertores premortem (reduce secreciones bronquiales), dolor cólico por obstrucción intestinal maligna, espasmo vesical. No cruza BHE: no causa sedación ni delirium."
   },precauciones:"Contraindicado en glaucoma de ángulo estrecho. Retención urinaria. Taquicardia. No usar con anticolinérgicos centrales. Vía SC bien tolerada."},

  {id:"metoclopramida",name:"Metoclopramida",cat:"Procinético / Antiemético",grupo:"Antiemético",
   atc:"A03FA01",invima:"Registros INVIMA vigentes.",

   indicacion_invima:"Náuseas y vómitos. Gastroparesia. Facilitación del vaciamiento gástrico.",

     total:"Antiemético de primera línea en cuidados paliativos para náusea por opioides, gastroparesia, y estasis gástrica. Registro INVIMA vigente. Complementa el manejo del bienestar del paciente."
   },precauciones:"Contraindicada en obstrucción intestinal completa, feocromocitoma, Parkinson. Riesgo de discinesia tardía (limitar duración). Síntomas extrapiramidales. No asociar con haloperidol (potencia síntomas extrapiramidales)."},

  {id:"ondansetron",name:"Ondansetrón",cat:"Antiemético 5-HT3",grupo:"Antiemético",
   atc:"A04AA01",invima:"Registros INVIMA vigentes.",

   indicacion_invima:"Prevención y tratamiento de náuseas y vómitos.",

   },precauciones:"Prolonga QTc (precaución con otros QTc prolongadores). Estreñimiento (frecuente). No tiene efecto procinético. Puede usarse vía SC."},

  {id:"ketamina",name:"Ketamina",cat:"Antagonista NMDA",grupo:"Dolor refractario",
   atc:"N01AX03",invima:"Registros INVIMA vigentes. Control especial.",
   presentaciones:"Ampolla 500mg/10mL (50mg/mL).",
   indicacion_invima:"Anestesia general. Sedación procedural.",

   justificacion_tipos:{
     nociceptivo_somatico:"Ketamina como uso fuera de indicación (off-label) en dolor somático refractario a opioides. Antagonismo NMDA revierte tolerancia opioide y sensibilización central. Uso en cuidados paliativos respaldado por guías SECPAL e IAHPC.",
     neuropatico:"Ketamina tiene indicación específica en dolor neuropático refractario por su antagonismo NMDA. Bloquea wind-up y sensibilización central implicados en dolor neuropático crónico. Evidencia en dolor por miembro fantasma, plexopatía tumoral refractaria. Uso off-label respaldado por guías internacionales de cuidados paliativos.",
     mixto:"Ketamina como último recurso en dolor mixto refractario. El antagonismo NMDA aborda la sensibilización central presente en dolor crónico complejo. Puede permitir reducción de dosis de opioides (efecto ahorrador).",
     total:"Ketamina en dolor total refractario: cuando todas las intervenciones analgésicas convencionales han fracasado. Uso off-label respaldado por guías internacionales. Documentar refractariedad, consentimiento, y proporcionalidad."
   },precauciones:"Uso off-label en dolor (indicación INVIMA: anestesia). Efectos psicomiméticos (alucinaciones, disforia): prevenir con haloperidol o midazolam en dosis bajas. Hipertensión. Contraindicada en HTA no controlada, cardiopatía isquémica, HIC."},

  {id:"levomepromazina",name:"Levomepromazina",cat:"Antipsicótico / Antiemético",grupo:"Sedación / Antiemético amplio",
   atc:"N05AA02",invima:"Registros INVIMA vigentes.",
   presentaciones:"Gotas 40mg/mL. Tab 25/100mg. Ampolla 25mg/mL.",
   indicacion_invima:"Psicosis. Agitación. Dolor crónico severo.",

   justificacion_tipos:{

     total:"Levomepromazina en cuidados paliativos: antiemético de amplio espectro (bloquea D2, 5-HT2, H1, ACh), sedación paliativa (alternativa o complemento a midazolam), agitación/delirium refractario, y coadyuvante analgésico. Registro INVIMA incluye dolor crónico severo."
